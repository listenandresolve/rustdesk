on:
  workflow_call:
    inputs:
      upload-artifact:
        type: boolean
        default: true
      upload-tag:
        type: string
        default: "nightly"
        
env:
  SCITER_RUST_VERSION: "1.75" # https://github.com/rustdesk/rustdesk/discussions/7503, also 1.78 has ABI change which causes our sciter version not working, https://blog.rust-lang.org/2024/03/30/i128-layout-update.html
  RUST_VERSION: "1.75" # sciter failed on m1 with 1.78 because of https://blog.rust-lang.org/2024/03/30/i128-layout-update.html
  MAC_RUST_VERSION: "1.81" # 1.81 is requred for macos, because of https://github.com/yury/cidre requires 1.81
  CARGO_NDK_VERSION: "3.1.2"
  SCITER_ARMV7_CMAKE_VERSION: "3.29.7"
  SCITER_NASM_DEBVERSION: "2.15.05-1"
  LLVM_VERSION: "15.0.6"
  FLUTTER_VERSION: "3.24.5"
  ANDROID_FLUTTER_VERSION: "3.24.5"
  # for arm64 linux because official Dart SDK does not work
  FLUTTER_ELINUX_VERSION: "3.16.9"
  TAG_NAME: "${{ inputs.upload-tag }}"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  # vcpkg version: 2025.08.27
  # If we change the `VCPKG COMMIT_ID`, please remember:
  # 1. Call `$VCPKG_ROOT/vcpkg x-update-baseline` to update the baseline in `vcpkg.json`.
  #  Or we may face build issue like 
  #  https://github.com/rustdesk/rustdesk/actions/runs/14414119794/job/40427970174
  # 2. Update the `VCPKG_COMMIT_ID` in `ci.yml` and `playground.yml`.
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  ARMV7_VCPKG_COMMIT_ID: "6f29f12e82a8293156836ad81cc9bf5af41fe836" # 2025.01.13, got "/opt/artifacts/vcpkg/vcpkg: No such file or directory" with latest version
  VERSION: "1.4.8"
  NDK_VERSION: "r28c"
  #signing keys env variable checks
  MACOS_P12_BASE64: "${{ secrets.MACOS_P12_BASE64 }}"
  UPLOAD_ARTIFACT: "${{ inputs.upload-artifact }}"
  SIGN_BASE_URL: "${{ secrets.SIGN_BASE_URL }}"

jobs:
  generate-bridge:
    uses: ./.github/workflows/bridge.yml

  build-RustDeskTempTopMostWindow:
    uses: ./.github/workflows/third-party-RustDeskTempTopMostWindow.yml
    strategy:
      fail-fast: false
      matrix:
        job:
          - {
              target: windows-2022,
              platform: x64,
            }
          - {
              target: windows-11-arm,
              platform: ARM64,
            }
    with:
      upload-artifact: ${{ inputs.upload-artifact }}
      target: ${{ matrix.job.target }}
      configuration: Release
      platform: ${{ matrix.job.platform }}
      target_version: Windows10

  build-for-windows-flutter:
    name: ${{ matrix.job.target }}
    needs: [build-RustDeskTempTopMostWindow, generate-bridge]
    runs-on: ${{ matrix.job.os }}
    strategy:
      fail-fast: false
      matrix:
        job:
          # - { target: i686-pc-windows-msvc        , os: windows-2022                  }
          # - { target: x86_64-pc-windows-gnu       , os: windows-2022                  }
          - {
              target: x86_64-pc-windows-msvc,
              os: windows-2022,
              arch: x86_64,
              flutter-arch: x64,
              vcpkg-triplet: x64-windows-static,
              build-args: "--vram",
            }
          - {
              target: aarch64-pc-windows-msvc,
              os: windows-11-arm,
              arch: aarch64,
              flutter-arch: arm64,
              vcpkg-triplet: arm64-windows-static,
              # vram is x86/x64-only (NVENC needs CUDA, Intel MediaSDK needs __rdtsc);
              # no NV/Intel/AMD hardware exists on Windows-on-ARM, so vram stays disabled here.
              build-args: "",
            }
    steps:
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v6
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout source code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Restore bridge files
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          # arm64 is on Flutter 3.44, so it needs the bridge generated with the same Flutter
          # (its *.freezed.dart must match the freezed the arm64 build resolves). x64 and every
          # other platform keep the default 3.22.3-generated bridge.
          name: ${{ matrix.job.arch == 'aarch64' && 'bridge-artifact-flutter-3.44' || 'bridge-artifact' }}
          path: ./

#=====# CUSTOMIZATION LISTEN AND RESOLVE (WINDOWS)
      - name: CUSTOMIZATION CLIENT LISTEN AND RESOLVE (Windows)
        env:
          RENDEZVOUS_SERVER: "${{ secrets.RENDEZVOUS_SERVER }}"
          API_SERVER: "${{ secrets.API_SERVER }}"
          RS_PUB_KEY: "${{ secrets.RS_PUB_KEY }}"
          RS_PWD: "${{ secrets.RS_PWD }}"
        shell: bash
        run: |
          # ==============================================================
          # Télécharger le PNG avec options SSL
          if ! curl -k -L --tlsv1.2 --proto =https --ssl-reqd \
            -H "User-Agent: Mozilla/5.0" \
            -o ./res/icon.png \
            https://listenandresolve.com/rustdesk/icon.png; then
            wget --no-check-certificate -O ./res/icon.png \
              https://listenandresolve.com/rustdesk/icon.png || echo "⚠️  Échec téléchargement PNG"
          fi
          # Télécharger le logo placeholder
          if ! curl -k -L --tlsv1.2 --proto =https --ssl-reqd \
            -H "User-Agent: Mozilla/5.0" \
            -o ./flutter/assets/logo.png \
            https://listenandresolve.com/rustdesk/logo.png; then
            wget --no-check-certificate -O ./flutter/assets/logo.png \
              https://listenandresolve.com/rustdesk/logo.png || echo "⚠️  Échec téléchargement PNG"
          fi

          # ==============================================================
          # Créer toutes les tailles d'icônes nécessaires
          echo -n "🟢 Création des icones Windows..."
          magick ./res/icon.png -trim +repage ./res/icon.png
          magick ./res/icon.png -define icon:auto-resize=256,128,96,64,48,40,32,24,16 ./res/icon.ico
          cp ./res/icon.ico ./res/tray-icon.ico
          cp ./res/icon.ico ./flutter/windows/runner/resources/app_icon.ico
          # Générer les PNG spécifiques
          magick ./res/icon.png -resize 32x32 ./res/32x32.png
          magick ./res/icon.png -resize 64x64 ./res/64x64.png
          magick ./res/icon.png -resize 128x128 ./res/128x128.png
          magick ./res/128x128.png -resize 200% ./res/128x128@2x.png
          magick ./res/icon.png ./flutter/assets/icon.svg
          echo "—————————"

          # ==============================================================
          # Modifier le fichier ui.rs pour remplacer l'icône intégrée en base64
          b64=$(base64 -w 0 ./res/icon.png)
          sed -i "s~data:image/png;base64,[^\"]*~data:image/png;base64,$b64~g" ./src/ui.rs
          echo "—————————"

          # ==============================================================
          # Modification du logo
          echo "🟢 Injection du logo..."
          cat > /tmp/new_logo.dart << 'EOF'
          Widget loadLogo() {
            return Container(
              margin: const EdgeInsets.only(left: 24, right: 24, top: 20, bottom: 12),
              child: ClipRRect(
                    borderRadius: BorderRadius.circular(12),
                    child: Image.network(
                      'https://listenandresolve.com/rustdesk/client.webp',
                      width: double.infinity,
                      height: 200,
                      fit: BoxFit.contain,
                      errorBuilder: (context, error, stackTrace) {
                        return Image.asset(
                          'assets/logo.png',
                          width: double.infinity,
                          height: 200,
                          fit: BoxFit.contain,
                        );
                      },
                    ),
                  ),
                );
              }
          EOF

          export NEW_LOGO=$(cat /tmp/new_logo.dart)
          perl -i -0777 -pe 's/Widget loadLogo\(\) \{.*?\n\}/$ENV{NEW_LOGO}/sg' flutter/lib/common.dart
          echo "—————————"

          # ==============================================================
          echo "🟢 Vide buildHelpCards et supprime buildInstallCard..."
          perl -i -0777 -pe '
            s/Widget buildHelpCards\(String updateUrl\) \{.*?\n  \}/Widget buildHelpCards(String updateUrl) {\n    return Container();\n  }/sg;
            s/Widget buildInstallCard\(.*?\n  \}/ /sg;
          ' flutter/lib/desktop/pages/desktop_home_page.dart

          # ==============================================================
          echo "🟢 Remplacement buildPopupMenu..."
          perl -i -0777 -pe 's/Widget buildPopupMenu\(BuildContext context\) \{.*?\n  \}/Widget buildPopupMenu(BuildContext context) {
            final textColor = Theme.of(context).textTheme.titleLarge?.color;
            RxBool hover = false.obs;
            return InkWell(
              onTap: DesktopTabPage.onAddSetting,
              splashColor: Colors.transparent,
              highlightColor: Colors.transparent,
              child: Tooltip(
                message: translate("Settings"),
                child: Obx(
                  () => Padding(
                    padding: const EdgeInsets.all(2),
                    child: Icon(
                      Icons.settings,
                      size: 14,
                      color: hover.value ? textColor : textColor?.withOpacity(0.4),
                    ),
                  ),
                ),
              ),
              onHover: (value) => hover.value = value,
            );
          }/sg' flutter/lib/desktop/pages/desktop_home_page.dart
          echo "—————————"

          # ==============================================================
          echo "🟢 Remplacement de buildLeftPane..."
          perl -i -0777 -pe 's/Widget buildLeftPane\(BuildContext context\) \{.*?\n  \}/Widget buildLeftPane(BuildContext context) {
            final isIncomingOnly = bind.isIncomingOnly();
            final isOutgoingOnly = bind.isOutgoingOnly();
            final children = <Widget>[
              if (!isOutgoingOnly) buildPresetPasswordWarning(),
              if (bind.isCustomClient()) Align(alignment: Alignment.center, child: loadPowered(context)),
              loadLogo(),
              if (!isOutgoingOnly) buildIDBoard(context),
              FutureBuilder<Widget>(
                future: Future.value(Obx(() => buildHelpCards(stateGlobal.updateUrl.value))),
                builder: (_, data) {
                  if (data.hasData) {
                    if (isIncomingOnly && isInHomePage()) {
                      Future.delayed(Duration(milliseconds: 300), () => _updateWindowSize());
                    }
                    return data.data!;
                  }
                  return const Offstage();
                },
              ),
              buildPluginEntry(),
            ];
            if (isIncomingOnly) {
              children.addAll([
                Divider(),
                OnlineStatusWidget(onSvcStatusChanged: () {
                  if (isInHomePage()) Future.delayed(Duration(milliseconds: 300), () => _updateWindowSize());
                }).marginOnly(bottom: 6, right: 6)
              ]);
            }
            return ChangeNotifierProvider.value(
              value: gFFI.serverModel,
              child: Container(
                width: isIncomingOnly ? 300.0 : 200.0,
                color: Theme.of(context).colorScheme.background,
                child: Stack(children: [
                  Column(children: [
                    SingleChildScrollView(
                      controller: _leftPaneScrollController,
                      child: Column(key: _childKey, children: children),
                    ),
                    Expanded(child: Container())
                  ]),
                ]),
              ),
            );
          }/sg' flutter/lib/desktop/pages/desktop_home_page.dart
          echo "—————————"

          # ==============================================================
          echo "🟢 Remplacement de buildIDBoard..."
          perl -i -0777 -pe 's/buildIDBoard\(BuildContext context\) \{.*?\n  \}/buildIDBoard(BuildContext context) {
            final model = gFFI.serverModel;
            return Container(
              margin: const EdgeInsets.only(left: 24, right: 24, bottom: 12),
              padding: const EdgeInsets.symmetric(horizontal: 14, vertical: 14),
              decoration: BoxDecoration(
                color: Theme.of(context).colorScheme.surface,
                borderRadius: BorderRadius.circular(12),
                boxShadow: [
                  BoxShadow(
                    color: Theme.of(context).shadowColor.withOpacity(0.05), 
                    blurRadius: 10,
                    offset: const Offset(0, 4),
                  ),
                ],
              ),
              child: Column(
                crossAxisAlignment: CrossAxisAlignment.start,
                mainAxisSize: MainAxisSize.min,
                children: [
                  Row(
                    mainAxisAlignment: MainAxisAlignment.spaceBetween,
                    children: [
                      Text(translate("Identifiant"), style: TextStyle(fontSize: 12, color: Theme.of(context).textTheme.titleLarge?.color?.withOpacity(0.5))),
                      Row(children: [LNRWebsiteButton(context), LNRGotoInstallButton(context), buildPopupMenu(context)]),
                    ],
                  ),
                  SizedBox(height: 6),
                  GestureDetector(
                    onDoubleTap: () {
                      Clipboard.setData(ClipboardData(text: model.serverId.text));
                      showToast(translate("Copied"));
                    },
                    child: TextFormField(
                      controller: model.serverId,
                      readOnly: true,
                      textAlign: TextAlign.center,
                      decoration: InputDecoration(border: InputBorder.none, isDense: true, contentPadding: EdgeInsets.zero, filled: true, fillColor: Colors.transparent),
                      style: TextStyle(fontSize: 26, fontWeight: FontWeight.bold, color: Color(0xFF6A0DAD)),
                    ).workaroundFreezeLinuxMint(),
                  ),
                ],
              ),
            );
          }/sg' flutter/lib/desktop/pages/desktop_home_page.dart
          echo "—————————"

          # ==============================================================
          echo "🟢 Injection des nouveaux boutons..."
          perl -i -0777 -pe 's~(Widget buildPopupMenu\(BuildContext context\) \{.*?\n  \})~$1\n\nWidget LNRGotoInstallButton(BuildContext context) {
            final textColor = Theme.of(context).textTheme.titleLarge?.color;
            RxBool hover = false.obs;
            return InkWell(
              onTap: () async {
                await rustDeskWinManager.closeAllSubWindows();
                bind.mainGotoInstall();
              },
              splashColor: Colors.transparent,
              highlightColor: Colors.transparent,
              child: Tooltip(
                message: translate("Installer"),
                child: Obx(() => Padding(
                  padding: const EdgeInsets.all(2),
                  child: Icon(Icons.install_desktop, size: 14, color: hover.value ? textColor : textColor?.withOpacity(0.4)),
                )),
              ),
              onHover: (value) => hover.value = value,
            );
          }
          
          Widget LNRWebsiteButton(BuildContext context) {
            final Uri _url = Uri.parse("https://listenandresolve.com");
            final textColor = Theme.of(context).textTheme.titleLarge?.color;
            RxBool hover = false.obs;
            return InkWell(
              onTap: () async {
                if (!await launchUrl(_url, mode: LaunchMode.externalApplication)) {
                  throw Exception("Impossible d'\''ouvrir \$_url");
                }
              },
              splashColor: Colors.transparent,
              highlightColor: Colors.transparent,
              child: Tooltip(
                message: "listenandresolve.com",
                child: Obx(() => Padding(
                  padding: const EdgeInsets.all(2),
                  child: Icon(Icons.language, size: 14, color: hover.value ? textColor : textColor?.withOpacity(0.4)),
                )),
              ),
              onHover: (value) => hover.value = value,
            );
          }~sg' flutter/lib/desktop/pages/desktop_home_page.dart
          echo "—————————"

          # ==============================================================
          # Reset de l'Auto-Updater
          echo -n "🟢 Reset de l'Auto-Updater et du relais..."
          
          # 1. Remplacement de l'URL de l'API
          perl -i -pe "s|https://api.rustdesk.com/version/latest|https://listenandresolve.com/rustdesk/api.php?action=check|g" ./libs/hbb_common/src/lib.rs

          # 3. Remplacement des serveurs relais
          perl -i -pe "s/([a-zA-Z0-9-]+\.)?rustdesk\.com/rd.listenandresolve.com/g" ./libs/hbb_common/src/config.rs
          perl -i -pe "s/([a-zA-Z0-9-]+\.)?rustdesk\.com/rd.listenandresolve.com/g" ./libs/hbb_common/src/websocket.rs
          
          # 4. Modification de la sécurité is_public dans config.rs
          perl -i -0777 -pe 's/pub fn is_public\(url: \&str\)\s*->\s*bool\s*\{.*?\}/pub fn is_public(url: \&str) -> bool { url.contains("listenandresolve.com") }/gs' ./libs/hbb_common/src/config.rs
          echo "—————————"
          
          # ==============================================================
          # Injection du serveur
          echo -n "🟢 Configuration du serveur..."
          perl -i -pe "s|rs-ny\.rustdesk\.com|${RENDEZVOUS_SERVER}|g" ./libs/hbb_common/src/config.rs
          perl -i -pe "s|OeVuKk5nlHiXp\+APNn0Y3pC1Iwpwn44JGqrQCsWqmBw=|${RS_PUB_KEY}|g" ./libs/hbb_common/src/config.rs
          echo "—————————"

          # ==============================================================
          # Injection des Overwrite Settings
          echo -n "🟢 Configuration des Overwrite Settings..."
          cat << 'EOF' > overwritesettings.txt
              pub static ref OVERWRITE_SETTINGS: RwLock<HashMap<String, String>> = {
                  let mut m = HashMap::new();
                  m.insert("api-server".to_string(), "https://rd.listenandresolve.com".to_string());
                  m.insert("access-mode".to_string(), "full".to_string());
                  m.insert("allow-remote-config-modification".to_string(), "Y".to_string());
                  m.insert("allow-remove-wallpaper".to_string(), "Y".to_string());
                  m.insert("allow-remote-cm-modification".to_string(), "Y".to_string());
                  m.insert("allow-numeric-one-time-password".to_string(), "Y".to_string());
                  m.insert("allow-websocket".to_string(), "Y".to_string());
                  m.insert("disable-udp".to_string(), "Y".to_string());
                  m.insert("enable-remote-restart".to_string(), "Y".to_string());
                  m.insert("enable-file-copy-paste".to_string(), "Y".to_string());
                  m.insert("enable-remote-printer".to_string(), "N".to_string());
                  m.insert("enable-flutter-http-on-rust".to_string(), "Y".to_string());
                  m.insert("enable-udp-punch".to_string(), "N".to_string());
                  m.insert("enable-ipv6-punch".to_string(), "N".to_string());
                  RwLock::new(m)
              };
          EOF
          
          perl -i -0pe 's|pub static ref OVERWRITE_SETTINGS: RwLock<HashMap<String, String>> = Default::default\(\);|'"$(cat overwritesettings.txt)"'|g' ./libs/hbb_common/src/config.rs
          echo "—————————"

          # ==============================================================
          # Injection des Builtin Settings
          echo -n "🟢 Configuration des Builtin Settings..."
          cat << 'EOF' > builtinsettings.txt
              pub static ref BUILTIN_SETTINGS: RwLock<HashMap<String, String>> = {
                  let mut m = HashMap::new();
                  m.insert("allow-logon-screen-password".to_string(), "Y".to_string());
                  m.insert("allow-https-21114".to_string(), "Y".to_string());
                  m.insert("hide-help-cards".to_string(), "Y".to_string());
                  RwLock::new(m)
              };
          EOF
          
          perl -i -0pe 's|pub static ref BUILTIN_SETTINGS: RwLock<HashMap<String, String>> = Default::default\(\);|'"$(cat builtinsettings.txt)"'|g' ./libs/hbb_common/src/config.rs
          echo "—————————"

          # ==============================================================
          # Injection des Hard Settings
          echo -n "🟢 Configuration des Hard Settings..."
          cat << 'EOF' > hardsettings.txt
              pub static ref HARD_SETTINGS: RwLock<HashMap<String, String>> = {
                  let mut m = HashMap::new();
                  m.insert("conn-type".to_string(), "incoming".to_string());
                  m.insert("force-always-relay".to_string(), "Y".to_string());
                  m.insert("disable-settings".to_string(), "Y".to_string());
                  m.insert("disable-account".to_string(), "Y".to_string());
                  m.insert("disable-installation".to_string(), "Y".to_string());
                  m.insert("password".to_string(), "__PASSWORD_PLACEHOLDER__".to_string());
                  RwLock::new(m)
              };
          EOF
          perl -i -pe 's/__PASSWORD_PLACEHOLDER__/$ENV{RS_PWD}/g' hardsettings.txt
          perl -i -pe 's/@/\\@/g' hardsettings.txt
          perl -i -0pe 's|pub static ref HARD_SETTINGS: RwLock<HashMap<String, String>> = Default::default\(\);|'"$(cat hardsettings.txt)"'|g' ./libs/hbb_common/src/config.rs
          echo "—————————"

          # ==============================================================
          # Modifier le nom de l'entreprise
          echo -n "🟢 Configuration entreprise..."
          perl -i -pe 's|Purslane Ltd|Listen and Resolve|g' ./flutter/lib/desktop/pages/desktop_setting_page.dart
          perl -i -pe 's|PURSLANE|LISTEN AND RESOLVE|g' ./res/msi/preprocess.py
          perl -i -pe 's|Purslane Ltd|Listen and Resolve|g' ./res/msi/preprocess.py
          perl -i -pe 's|Purslane Ltd|Listen and Resolve|g' ./flutter/windows/runner/Runner.rc
          perl -i -pe 's|Purslane Ltd|Listen and Resolve|g' ./Cargo.toml
          perl -i -pe 's|Purslane Ltd|Listen and Resolve|g' ./libs/portable/Cargo.toml
          perl -i -pe 's|Purslane Ltd|Listen and Resolve|g' ./src/ui/index.tis

          # Modifier le nom du dossier dans APPDATA (pour éviter conflits avec la version officielle)
          perl -i -pe 's|&APP_NAME\.read()\.unwrap()|"LNRDesk"|g' ./libs/hbb_common/src/config.rs

          # CHANGE LE NOM DU PRODUIT DANS LE MSI
          perl -i -pe 's|ProductName = "RustDesk"|ProductName = "LNRDesk"|g' Cargo.toml
          echo "—————————"

          # ==============================================================
          # Modifier les URL
          echo -n "🟢 Configuration des URL..."
          perl -i -pe 's|Homepage: https://rustdesk.com|Homepage: https://lnr.info|g' ./build.py
          perl -i -pe "s|launchUrl\\(Uri\\.parse\\('https://rustdesk\\.com'\\)\\);|launchUrl(Uri.parse('https://lnr.info'));|g" ./flutter/lib/common.dart
          perl -i -pe "s|launchUrlString\\('https://rustdesk\\.com'\\);|launchUrlString('https://lnr.info');|g" ./flutter/lib/desktop/pages/desktop_setting_page.dart
          perl -i -pe "s|launchUrlString\\('https://rustdesk\\.com/privacy\\.html'\\)|launchUrlString('https://lnr.info/rustdesk')|g" ./flutter/lib/desktop/pages/desktop_setting_page.dart
          perl -i -pe "s|const url = 'https://rustdesk\\.com/';|const url = 'https://lnr.info';|g" ./flutter/lib/mobile/pages/settings_page.dart
          perl -i -pe "s|launchUrlString\\('https://rustdesk\\.com/privacy\\.html'\\)|launchUrlString('https://lnr.info/rustdesk')|g" ./flutter/lib/mobile/pages/settings_page.dart
          perl -i -pe 's|https://rustdesk\.com/privacy\.html|https://lnr.info/rustdesk|g' ./flutter/lib/desktop/pages/install_page.dart
          echo "—————————"
#=====# CUSTOMIZATION LISTEN AND RESOLVE (WINDOWS)

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@ebc0426251bc40c7cd31162802432c68818ab8f0 # v2.0.9
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Install flutter
        id: flutter
        # arm64 builds with FLUTTER_WINDOWS_ARM_VERSION (>=3.44); x64 stays on FLUTTER_VERSION.
        # subosito only ships an x64 Windows SDK (Flutter's release manifest lists x64 only),
        # so it installs x64 on both arches. The arm64 runner re-bootstraps Dart to arm64 in
        # the next step.
        uses: subosito/flutter-action@2783a3f08e1baf891508463f8c6653c258246225  # v2.12.0; https://github.com/subosito/flutter-action/issues/277
        with:
          channel: "stable"
          flutter-version: ${{ matrix.job.arch == 'aarch64' && env.FLUTTER_WINDOWS_ARM_VERSION || env.FLUTTER_VERSION }}
          architecture: x64

      - name: Force arm64 Dart SDK + engine
        # The x64 SDK subosito installs bundles an x64 Dart with a matching engine-dart-sdk.stamp,
        # so update_dart_sdk.ps1 short-circuits (stamp matches -> return) and keeps x64 Dart;
        # `flutter build windows` then targets the Dart VM's arch = x64, even on this arm64 host.
        # On this native-arm64 runner (PROCESSOR_ARCHITECTURE=ARM64), deleting the stamp and
        # re-running update_dart_sdk.ps1 pulls the arm64 Dart (available since Flutter 3.44.0).
        # https://github.com/flutter/flutter/issues/186730#issuecomment-4573214964
        if: ${{ matrix.job.arch == 'aarch64' }}
        run: |
          $flutterRoot = "${{ steps.flutter.outputs['CACHE-PATH'] }}"
          Write-Host "PROCESSOR_ARCHITECTURE=$env:PROCESSOR_ARCHITECTURE"
          Write-Host "Flutter root: $flutterRoot"
          Remove-Item -Force "$flutterRoot\bin\cache\engine-dart-sdk.stamp" -ErrorAction SilentlyContinue
          & "$flutterRoot\bin\internal\update_dart_sdk.ps1"
          # Confirm the Dart we ended up with is arm64 ("on windows_arm64"); fail loudly if not.
          $dartVer = & "$flutterRoot\bin\dart.bat" --version 2>&1 | Out-String
          Write-Host $dartVer
          if ($dartVer -notmatch "windows_arm64") {
            Write-Error "Expected an arm64 Dart SDK but got: $dartVer"
            exit 1
          }
          & "$flutterRoot\bin\flutter.bat" precache --windows
          # Fail fast if precache pulled the wrong-arch Windows engine: an arm64 Dart should
          # fetch windows-arm64 engine artifacts. Bailing here saves the ~25min Rust build.
          $engineDir = "$flutterRoot\bin\cache\artifacts\engine"
          Write-Host "Engine artifacts present:"
          Get-ChildItem $engineDir -Directory | Select-Object -ExpandProperty Name | Write-Host
          if (-not (Test-Path "$engineDir\windows-arm64-release")) {
            Write-Error "Expected windows-arm64-release engine artifacts but they are missing (wrong-arch SDK)."
            exit 1
          }

      # https://github.com/flutter/flutter/issues/155685
      # x64 only: arm64 uses the stock native arm64 Windows engine, and the rustdesk/engine
      # windows-x64-release.zip is built for the 3.24-era x64 engine (matches FLUTTER_VERSION).
      - name: Replace engine with rustdesk custom flutter engine
        if: ${{ matrix.job.arch == 'x86_64' }}
        run: |
          flutter doctor -v
          flutter precache --windows
          Invoke-WebRequest -Uri https://github.com/rustdesk/engine/releases/download/main/windows-x64-release.zip -OutFile windows-x64-release.zip
          Expand-Archive -Path windows-x64-release.zip -DestinationPath windows-x64-release
          mv -Force windows-x64-release/*  C:/hostedtoolcache/windows/flutter/stable-${{ env.FLUTTER_VERSION }}-x64/bin/cache/artifacts/engine/windows-x64-release/

      - name: Patch flutter
        # x64 stays on Flutter 3.24.5, which needs the dropdown filter patch.
        # arm64 is on Flutter 3.44 (patched separately below) and does not use this patch.
        if: ${{ matrix.job.arch == 'x86_64' }}
        shell: bash
        run: |
          cp .github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff $(dirname $(dirname $(which flutter)))
          cd $(dirname $(dirname $(which flutter)))
          [[ "3.24.5" == ${{env.FLUTTER_VERSION}} ]] && git apply flutter_3.24.4_dropdown_menu_enableFilter.diff

      - name: Patch RustDesk sources for Flutter 3.44 (arm64)
        # arm64 is the only target on Flutter 3.44; apply its source/pubspec deltas on the fly
        # (shared with the 3.44 bridge job) so the committed sources stay on Flutter 3.24.5.
        # `flutter build` then runs `pub get`, regenerating pubspec.lock for the bumped deps.
        if: ${{ matrix.job.arch == 'aarch64' }}
        shell: bash
        run: bash .github/patches/apply_flutter_3.44_source_patches.sh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.SCITER_RUST_VERSION }}
          targets: ${{ matrix.job.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          prefix-key: ${{ matrix.job.os }}

      - name: Setup vcpkg with Github Actions binary cache
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2 # v11
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        env:
          VCPKG_DEFAULT_HOST_TRIPLET: ${{ matrix.job.vcpkg-triplet }}
        run: |
          if ! $VCPKG_ROOT/vcpkg \
            install \
            --triplet ${{ matrix.job.vcpkg-triplet }} \
            --x-install-root="$VCPKG_ROOT/installed"; then
            find "${VCPKG_ROOT}/" -name "*.log" | while read -r _1; do
              echo "$_1:"
              echo "======"
              cat "$_1"
              echo "======"
              echo ""
            done
            exit 1
          fi
          head -n 100 "${VCPKG_ROOT}/buildtrees/ffmpeg/build-${{ matrix.job.vcpkg-triplet }}-rel-out.log" || true
        shell: bash

      - name: Set SODIUM_LIB_DIR (arm64)
        # libsodium-sys ships no arm64 Windows prebuilt lib; point it at the vcpkg-built one
        # (only for arm64 — leaving it unset lets x64 use the crate's bundled lib).
        if: ${{ matrix.job.arch == 'aarch64' }}
        shell: bash
        run: echo "SODIUM_LIB_DIR=$VCPKG_ROOT/installed/${{ matrix.job.vcpkg-triplet }}/lib" >> "$GITHUB_ENV"

      - name: replace flutter icons
        continue-on-error: true
        run: |
          cd ./flutter
          flutter pub get
          flutter pub run flutter_launcher_icons
          cd ..

      - name: Build rustdesk
        run: |
          # Windows: build RustDesk
          # --hwcodec is shared by all Windows targets; per-target extras (e.g. --vram) come from the matrix
          python3 .\build.py --portable --flutter --skip-portable-pack --hwcodec ${{ matrix.job.build-args }}
          mv ./flutter/build/windows/${{ matrix.job.flutter-arch }}/runner/Release ./rustdesk

          # Download usbmmidd_v2.zip and extract it to ./rustdesk
          Invoke-WebRequest -Uri https://github.com/rustdesk-org/rdev/releases/download/usbmmidd_v2/usbmmidd_v2.zip -OutFile usbmmidd_v2.zip
          Expand-Archive usbmmidd_v2.zip -DestinationPath .
          Remove-Item -Path usbmmidd_v2\Win32 -Recurse
          Remove-Item -Path "usbmmidd_v2\deviceinstaller64.exe", "usbmmidd_v2\deviceinstaller.exe", "usbmmidd_v2\usbmmidd.bat"
          mv -Force .\usbmmidd_v2 ./rustdesk

          # Download printer driver files and extract them to ./rustdesk
          try {
            Invoke-WebRequest -Uri https://github.com/rustdesk/hbb_common/releases/download/driver/rustdesk_printer_driver_v4-1.4.zip -OutFile rustdesk_printer_driver_v4-1.4.zip
            Invoke-WebRequest -Uri https://github.com/rustdesk/hbb_common/releases/download/driver/printer_driver_adapter.zip -OutFile printer_driver_adapter.zip
            Invoke-WebRequest -Uri https://github.com/rustdesk/hbb_common/releases/download/driver/sha256sums -OutFile sha256sums

            # Check and move the files
            $checksum_driver = (Select-String -Path .\sha256sums -Pattern '^([a-fA-F0-9]{64}) \*rustdesk_printer_driver_v4-1.4\.zip$').Matches.Groups[1].Value
            $downloadsum_driver = Get-FileHash -Path rustdesk_printer_driver_v4-1.4.zip -Algorithm SHA256
            $checksum_adapter = (Select-String -Path .\sha256sums -Pattern '^([a-fA-F0-9]{64}) \*printer_driver_adapter\.zip$').Matches.Groups[1].Value
            $downloadsum_adapter = Get-FileHash -Path printer_driver_adapter.zip -Algorithm SHA256
            if ($checksum_driver -eq $downloadsum_driver.Hash -and $checksum_adapter -eq $downloadsum_adapter.Hash) {
                Write-Output "rustdesk_printer_driver_v4-1.4, checksums match, extract the file."
                Expand-Archive rustdesk_printer_driver_v4-1.4.zip -DestinationPath .
                mkdir ./rustdesk/drivers
                mv -Force .\rustdesk_printer_driver_v4-1.4 ./rustdesk/drivers/RustDeskPrinterDriver
                Expand-Archive printer_driver_adapter.zip -DestinationPath .
                mv -Force .\printer_driver_adapter.dll ./rustdesk
            } elseif ($checksum_driver -ne $downloadsum_driver.Hash) {
                Write-Output "rustdesk_printer_driver_v4-1.4, checksums do not match, ignore the file."
            } else {
                Write-Output "printer_driver_adapter.dll, checksums do not match, ignore the file."
            }
          } catch {
              Write-Host "Ingore the printer driver error."
          }

      - name: find Runner.res
        # Windows: find Runner.res (compiled from ./flutter/windows/runner/Runner.rc), copy to ./Runner.res
        # Runner.rc does not contain actual version, but Runner.res does
        continue-on-error: true
        shell: bash
        run: |
          runner_res=$(find . -name "Runner.res");
          if [ "$runner_res" == "" ]; then
            echo "Runner.res: not found";
          else
            echo "Runner.res: $runner_res";
            cp $runner_res ./libs/portable/Runner.res;
            echo "list ./libs/portable/Runner.res";
            ls -l ./libs/portable/Runner.res;
          fi

      - name: Download RustDeskTempTopMostWindow artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        if: ${{ inputs.upload-artifact }}
        with:
          name: ${{ matrix.job.arch == 'aarch64' && 'topmostwindow-artifacts-ARM64' || 'topmostwindow-artifacts-x64' }}
          path: "./rustdesk"

      - name: Upload unsigned
        if: env.UPLOAD_ARTIFACT == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lnrdesk-unsigned-windows-${{ matrix.job.arch }}
          path: rustdesk

### CUSTOMIZATION LISTEN AND RESOLVE
      - name: Sign Rustdesk files (Azure Trusted Signing)
        if: env.UPLOAD_ARTIFACT == 'true'
        uses: azure/trusted-signing-action@v0.5.1
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_CODE_SIGNING_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE_NAME }}
          files-folder: ./rustdesk
          files-folder-filter: exe
### CUSTOMIZATION LISTEN AND RESOLVE

      - name: Build self-extracted executable
        shell: bash
        if: env.UPLOAD_ARTIFACT == 'true'
        run: |
          sed -i '/dpiAware/d' res/manifest.xml
          pushd ./libs/portable
          pip3 install -r requirements.txt
          python3 ./generate.py -f ../../rustdesk/ -o . -e ../../rustdesk/rustdesk.exe
          popd
          mkdir -p ./SignOutput
          mv ./target/release/rustdesk-portable-packer.exe ./SignOutput/lnrdesk-${{ matrix.job.arch }}.exe

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce # v2

      - name: Build msi
        # Builds the MSI for the matrix arch. res/msi (WiX v4 + native CustomActions) carries
        # both x64 and ARM64 platform configs; WcaUtil/DUtil ship arm64 libs. msbuild platform
        # is x64 / ARM64; the produced Package.msi is globbed since its bin/<platform>/ dir varies.
        if: env.UPLOAD_ARTIFACT == 'true'
        run: |
          pushd ./res/msi
          python preprocess.py --arp -d ../../rustdesk
          nuget restore msi.sln
          $msiPlatform = if ('${{ matrix.job.arch }}' -eq 'aarch64') { 'ARM64' } else { 'x64' }
          msbuild msi.sln -p:Configuration=Release -p:Platform=$msiPlatform /p:TargetVersion=Windows10
          $msi = Get-ChildItem ./Package/bin/*/Release/en-us/Package.msi | Select-Object -First 1
          mv $msi.FullName ../../SignOutput/lnrdesk-${{ matrix.job.arch }}.msi
          sha256sum ../../SignOutput/lnrdesk-*.msi

### CUSTOMIZATION LISTEN AND RESOLVE
      - name: Sign RustDesk self-extract (Azure Trusted Signing)
        if: env.UPLOAD_ARTIFACT == 'true'
        uses: azure/trusted-signing-action@v0.5.1
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_CODE_SIGNING_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE_NAME }}
          files-folder: ./SignOutput
          files-folder-filter: exe,msi
### CUSTOMIZATION LISTEN AND RESOLVE

      - name: Publish Release
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v1
        if: env.UPLOAD_ARTIFACT == 'true'
        with:
          prerelease: false
          make_latest: true
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.VERSION }}
          files: |
            ./SignOutput/lnrdesk-*.msi
            ./SignOutput/lnrdesk-*.exe
