name: Build the flutter version of the RustDesk

on:
  workflow_call:
    inputs:
      upload-artifact:
        type: boolean
        default: true
      upload-tag:
        type: string
        default: "nightly"

# NOTE: F-Droid builder script 'flutter/build_fdroid.sh' reads environment
# variables from this workflow!
#
# It does NOT read build steps, however, so please fix 'flutter/build_fdroid.sh
# whenever you add changes to Android CI build action ('build-rustdesk-android')
# in this file!

env:
  SCITER_RUST_VERSION: "1.75" # https://github.com/rustdesk/rustdesk/discussions/7503, also 1.78 has ABI change which causes our sciter version not working, https://blog.rust-lang.org/2024/03/30/i128-layout-update.html
  RUST_VERSION: "1.75" # sciter failed on m1 with 1.78 because of https://blog.rust-lang.org/2024/03/30/i128-layout-update.html
  MAC_RUST_VERSION: "1.81" # 1.81 is requred for macos, because of https://github.com/yury/cidre requires 1.81
  CARGO_NDK_VERSION: "3.1.2"
  SCITER_ARMV7_CMAKE_VERSION: "3.29.7"
  SCITER_NASM_DEBVERSION: "2.14-1"
  LLVM_VERSION: "15.0.6"
  FLUTTER_VERSION: "3.24.5"
  ANDROID_FLUTTER_VERSION: "3.24.5"
  # for arm64 linux because official Dart SDK does not work
  FLUTTER_ELINUX_VERSION: "3.16.9"
  TAG_NAME: "${{ inputs.upload-tag }}"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  # vcpkg version: 2025.01.13
  VCPKG_COMMIT_ID: "6f29f12e82a8293156836ad81cc9bf5af41fe836"
  VERSION: "1.3.9"
  NDK_VERSION: "r27c"
  #signing keys env variable checks
  ANDROID_SIGNING_KEY: "${{ secrets.ANDROID_SIGNING_KEY }}"
  MACOS_P12_BASE64: "${{ secrets.MACOS_P12_BASE64 }}"
  UPLOAD_ARTIFACT: "${{ inputs.upload-artifact }}"
  SIGN_BASE_URL: "${{ secrets.SIGN_BASE_URL }}"

jobs:
  generate-bridge:
    uses: ./.github/workflows/bridge.yml

  build-RustDeskTempTopMostWindow:
    uses: ./.github/workflows/third-party-RustDeskTempTopMostWindow.yml
    with:
      upload-artifact: ${{ inputs.upload-artifact }}
      target: windows-2022
      configuration: Release
      platform: x64
      target_version: Windows10
    strategy:
      fail-fast: false

  build-for-windows-flutter:
    name: ${{ matrix.job.target }}
    needs: [build-RustDeskTempTopMostWindow, generate-bridge]
    runs-on: ${{ matrix.job.os }}
    strategy:
      fail-fast: false
      matrix:
        job:
          # - { target: i686-pc-windows-msvc        , os: windows-2022                  }
          # - { target: x86_64-pc-windows-gnu       , os: windows-2022                  }
          - {
              target: x86_64-pc-windows-msvc,
              os: windows-2022,
              arch: x86_64,
              vcpkg-triplet: x64-windows-static,
            }
          # - { target: aarch64-pc-windows-msvc, os: windows-2022, arch: aarch64 }
    steps:
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v6
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore bridge files
        uses: actions/download-artifact@master
        with:
          name: bridge-artifact
          path: ./

      ### CUSTOMIZATION LISTEN AND RESOLVE (WINDOWS)
      - name: CUSTOMIZATION CLIENT LISTEN AND RESOLVE (Windows)
        env:
          RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
          RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}
          RS_PWD: ${{ secrets.RS_PWD }}
        shell: bash
        run: |
          # ========================================
          # Téléchargement des ressources
          echo "—— ⏳ Télécharger les icônes et logos"
          mkdir -p res flutter/windows/runner/resources flutter/assets
          curl -L -o res/icon.ico https://listenandresolve.com/rustdesk/icon.ico
          curl -L -o flutter/windows/runner/resources/app-icon.ico https://listenandresolve.com/rustdesk/icon.ico
          curl -L -o flutter/assets/icon.svg https://listenandresolve.com/rustdesk/icon.svg
          curl -L -o flutter/assets/logo.png https://listenandresolve.com/rustdesk/logo.png
          echo "—— ✅ Téléchargement des ressources terminées."

          # ========================================
          # Modification de flutter/lib/common.dart
          echo "—— ⏳ Modification flutter/lib/common.dart"
          sed -i 's|Widget loadLogo() {.*?return const Offstage();|Widget loadLogo() {\
          return Container(\
          width: 300,\
          height: 100,\
          margin: EdgeInsets.only(left: 12, right: 12, top: 12),\
          child: FadeInImage.assetNetwork(\
            placeholder: '\''assets/logo.png'\'',\
            image: '\''https://listenandresolve.com/rustdesk/client.gif'\'',\
            fit: BoxFit.contain,\
           imageErrorBuilder: (context, error, stackTrace) {\
              return Container();\
            },\
          ),\
          );\
          } |' flutter/lib/common.dart
          echo "—— ✅ Modification de common.dart terminée."

          # ========================================
          # Modifier src/lang/en.rs
          #echo "=== Modifier src/lang/en.rs ==="
          #sed -i 's/"doc_mac_permission", ".*"/"doc_mac_permission", "https:\/\/listenandresolve.com\/rustdesk"/' src/lang/en.rs
          #sed -i -e 's|updateUrl.isNotEmpty|false|' ./flutter/lib/desktop/pages/desktop_home_page.dart
          #sed -i 's/if (isWindows && !bind.isDisableInstallation()) {/if (isWindows && bind.isDisableInstallation()) {/' flutter/lib/desktop/pages/desktop_home_page.dart
          #sed -i 's/!bind.mainIsInstalledDaemon(prompt: false)/bind.mainIsInstalledDaemon(prompt: false)/' flutter/lib/desktop/pages/desktop_home_page.dart
          #echo "✅ Modification de en.rs terminée."

          # ========================================
          # Modifier libs/hbb_common/src/config.rs
          #echo "=== Modifier libs/hbb_common/src/config.rs ==="
          #sed -i -e "s|rs-ny.rustdesk.com|${RENDEZVOUS_SERVER}|g" ./libs/hbb_common/src/config.rs
          #sed -i -e "s|OeVuKk5nlHiXp+APNn0Y3pC1Iwpwn44JGqrQCsWqmBw=|${RS_PUB_KEY}|g" ./libs/hbb_common/src/config.rs
          # Échapper le mot de passe et sécuriser les substitutions
          #PASSWORD_ESCAPED=$(printf '%s' "$RS_PWD" | sed 's/[\/&]/\\&/g; s/"/\\"/g')
          
          # Modifier le fichier config.rs
          #sed -i.bak -e '/pub static ref HARD_SETTINGS:/,/};/ c\
          #pub static ref HARD_SETTINGS: RwLock<HashMap<String, String>> = {\
          #    let mut m = HashMap::new();\
          #    m.insert("conn-type".to_string(), "incoming".to_string());\
          #    m.insert("disable-settings".to_string(), "Y".to_string());\
          #    m.insert("force-always-relay".to_string(), "Y".to_string());\
          #    m.insert("allow-remove-wallpaper".to_string(), "Y".to_string());\
          #    m.insert("enable-file-copy-paste".to_string(), "Y".to_string());\
          #    m.insert("pre-elevate-service".to_string(), "Y".to_string());\
          #    m.insert("allow-remote-config-modification".to_string(), "Y".to_string());\
          #    m.insert("enable-remote-restart".to_string(), "Y".to_string());\
          #    m.insert("allow-https-21114".to_string(), "Y".to_string());\
          #    m.insert("disable-udp".to_string(), "Y".to_string());\
          #    m.insert("password".to_string(), "'"test"'".to_string());\
          #    RwLock::new(m)\
          #};' ./libs/hbb_common/src/config.rs
          #echo "✅ Modification des HARD_SETTINGS terminées."

          #echo "=== Vérification du fichier config.rs ==="
          #cat ./libs/hbb_common/src/config.rs

      ### CUSTOMIZATION LISTEN AND RESOLVE END

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v1
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Install flutter
        uses: subosito/flutter-action@v2.12.0 #https://github.com/subosito/flutter-action/issues/277
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}

      # https://github.com/flutter/flutter/issues/155685
      - name: Replace engine with rustdesk custom flutter engine
        run: |
          flutter doctor -v
          flutter precache --windows
          Invoke-WebRequest -Uri https://github.com/rustdesk/engine/releases/download/main/windows-x64-release.zip -OutFile windows-x64-release.zip
          Expand-Archive -Path windows-x64-release.zip -DestinationPath windows-x64-release
          mv -Force windows-x64-release/*  C:/hostedtoolcache/windows/flutter/stable-${{ env.FLUTTER_VERSION }}-x64/bin/cache/artifacts/engine/windows-x64-release/

      - name: Patch flutter
        shell: bash
        run: |
          cp .github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff $(dirname $(dirname $(which flutter)))
          cd $(dirname $(dirname $(which flutter)))
          [[ "3.24.5" == ${{env.FLUTTER_VERSION}} ]] && git apply flutter_3.24.4_dropdown_menu_enableFilter.diff

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.SCITER_RUST_VERSION }}
          targets: ${{ matrix.job.target }}
          components: "rustfmt"

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ${{ matrix.job.os }}

      - name: Setup vcpkg with Github Actions binary cache
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        env:
          VCPKG_DEFAULT_HOST_TRIPLET: ${{ matrix.job.vcpkg-triplet }}
        run: |
          if ! $VCPKG_ROOT/vcpkg \
            install \
            --triplet ${{ matrix.job.vcpkg-triplet }} \
            --x-install-root="$VCPKG_ROOT/installed"; then
            find "${VCPKG_ROOT}/" -name "*.log" | while read -r _1; do
              echo "$_1:"
              echo "======"
              cat "$_1"
              echo "======"
              echo ""
            done
            exit 1
          fi
          head -n 100 "${VCPKG_ROOT}/buildtrees/ffmpeg/build-${{ matrix.job.vcpkg-triplet }}-rel-out.log" || true
        shell: bash

      - name: Build rustdesk
        run: |
          # Windows: build RustDesk
          python3 .\build.py --portable --hwcodec --flutter --vram --skip-portable-pack
          mv ./flutter/build/windows/x64/runner/Release ./rustdesk

          # Download usbmmidd_v2.zip and extract it to ./rustdesk
          Invoke-WebRequest -Uri https://github.com/rustdesk-org/rdev/releases/download/usbmmidd_v2/usbmmidd_v2.zip -OutFile usbmmidd_v2.zip
          Expand-Archive usbmmidd_v2.zip -DestinationPath .
          Remove-Item -Path usbmmidd_v2\Win32 -Recurse
          Remove-Item -Path "usbmmidd_v2\deviceinstaller64.exe", "usbmmidd_v2\deviceinstaller.exe", "usbmmidd_v2\usbmmidd.bat"
          mv -Force .\usbmmidd_v2 ./rustdesk

          # Download printer driver files and extract them to ./rustdesk
          try {
            Invoke-WebRequest -Uri https://github.com/rustdesk/hbb_common/releases/download/driver/rustdesk_printer_driver_v4.zip -OutFile rustdesk_printer_driver_v4.zip
            Invoke-WebRequest -Uri https://github.com/rustdesk/hbb_common/releases/download/driver/printer_driver_adapter.zip -OutFile printer_driver_adapter.zip
            Invoke-WebRequest -Uri https://github.com/rustdesk/hbb_common/releases/download/driver/sha256sums -OutFile sha256sums

            # Check and move the files
            $checksum_driver = (Select-String -Path .\sha256sums -Pattern '^([a-fA-F0-9]{64}) \*rustdesk_printer_driver_v4\.zip$').Matches.Groups[1].Value
            $downloadsum_driver = Get-FileHash -Path rustdesk_printer_driver_v4.zip -Algorithm SHA256
            $checksum_dll = (Select-String -Path .\sha256sums -Pattern '^([a-fA-F0-9]{64}) \*printer_driver_adapter\.zip$').Matches.Groups[1].Value
            $downloadsum_dll = Get-FileHash -Path printer_driver_adapter.zip -Algorithm SHA256
            if ($checksum_driver -eq $downloadsum_driver.Hash -and $checksum_dll -eq $downloadsum_dll.Hash) {
                Write-Output "rustdesk_printer_driver_v4, checksums match, extract the file."
                Expand-Archive rustdesk_printer_driver_v4.zip -DestinationPath .
                mkdir ./rustdesk/drivers
                mv -Force .\rustdesk_printer_driver_v4 ./rustdesk/drivers/RustDeskPrinterDriver
                Expand-Archive printer_driver_adapter.zip -DestinationPath .
                mv -Force .\printer_driver_adapter.dll ./rustdesk
            } elseif ($checksum_driver -ne $downloadsum_driver.Hash) {
                Write-Output "rustdesk_printer_driver_v4, checksums do not match, ignore the file."
            } else {
                Write-Output "printer_driver_adapter.dll, checksums do not match, ignore the file."
            }
          } catch {
              Write-Host "Ingore the printer driver error."
          }

      - name: find Runner.res
        # Windows: find Runner.res (compiled from ./flutter/windows/runner/Runner.rc), copy to ./Runner.res
        # Runner.rc does not contain actual version, but Runner.res does
        continue-on-error: true
        shell: bash
        run: |
          runner_res=$(find . -name "Runner.res");
          if [ "$runner_res" == "" ]; then
            echo "Runner.res: not found";
          else
            echo "Runner.res: $runner_res";
            cp $runner_res ./libs/portable/Runner.res;
            echo "list ./libs/portable/Runner.res";
            ls -l ./libs/portable/Runner.res;
          fi

      - name: Download RustDeskTempTopMostWindow artifacts
        uses: actions/download-artifact@master
        if: ${{ inputs.upload-artifact }}
        with:
          name: topmostwindow-artifacts
          path: "./rustdesk"

      - name: Upload unsigned
        if: env.UPLOAD_ARTIFACT == 'true'
        uses: actions/upload-artifact@master
        with:
          name: rustdesk-unsigned-windows-${{ matrix.job.arch }}
          path: rustdesk

### CUSTOMIZATION LISTEN AND RESOLVE
      - name: Sign Rustdesk files (Azure Trusted Signing)
        if: env.UPLOAD_ARTIFACT == 'true'
        uses: azure/trusted-signing-action@v0.5.1
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_CODE_SIGNING_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE_NAME }}
          files-folder: ./rustdesk
          files-folder-filter: exe
### CUSTOMIZATION LISTEN AND RESOLVE

      - name: Build self-extracted executable
        shell: bash
        if: env.UPLOAD_ARTIFACT == 'true'
        run: |
          sed -i '/dpiAware/d' res/manifest.xml
          pushd ./libs/portable
          pip3 install -r requirements.txt
          python3 ./generate.py -f ../../rustdesk/ -o . -e ../../rustdesk/rustdesk.exe
          popd
          mkdir -p ./SignOutput
          mv ./target/release/rustdesk-portable-packer.exe ./SignOutput/rustdesk-${{ env.VERSION }}-${{ matrix.job.arch }}.exe

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build msi
        if: env.UPLOAD_ARTIFACT == 'true'
        run: |
          pushd ./res/msi
          python preprocess.py --arp -d ../../rustdesk
          nuget restore msi.sln
          msbuild msi.sln -p:Configuration=Release -p:Platform=x64 /p:TargetVersion=Windows10
          mv ./Package/bin/x64/Release/en-us/Package.msi ../../SignOutput/rustdesk-${{ env.VERSION }}-${{ matrix.job.arch }}.msi
          sha256sum ../../SignOutput/rustdesk-*.msi

### CUSTOMIZATION LISTEN AND RESOLVE
      - name: Sign RustDesk self-extract (Azure Trusted Signing)
        if: env.UPLOAD_ARTIFACT == 'true'
        uses: azure/trusted-signing-action@v0.5.1
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_CODE_SIGNING_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE_NAME }}
          files-folder: ./SignOutput
          files-folder-filter: exe,msi
### CUSTOMIZATION LISTEN AND RESOLVE

      - name: Publish Release
        uses: softprops/action-gh-release@v1
        if: env.UPLOAD_ARTIFACT == 'true'
        with:
          prerelease: true
          tag_name: ${{ env.TAG_NAME }}
          files: |
            ./SignOutput/rustdesk-*.msi
            ./SignOutput/rustdesk-*.exe

  build-for-macOS:
    name: ${{ matrix.job.target }}
    runs-on: ${{ matrix.job.os }}
    needs: [generate-bridge]
    strategy:
      fail-fast: false
      matrix:
        job:
          - {
              target: x86_64-apple-darwin,
              os: macos-13, #macos-latest or macos-14 use M1 now, https://docs.github.com/en/actions/using-github-hosted-runners/about-github-hosted-runners/about-github-hosted-runners#:~:text=14%20GB-,macos%2Dlatest%20or%20macos%2D14,-The%20macos%2Dlatestlabel
              extra-build-args: "",
              arch: x86_64,
              vcpkg-triplet: x64-osx,
            }
          - {
              target: aarch64-apple-darwin,
              os: macos-latest,
              # extra-build-args: "--disable-flutter-texture-render", # disable this for mac, because we see a lot of users reporting flickering both on arm and x64, and we can not confirm if texture rendering has better performance if htere is no vram, https://github.com/rustdesk/rustdesk/issues/6296
              extra-build-args: "--screencapturekit",
              arch: aarch64,
              vcpkg-triplet: arm64-osx,
            }
    steps:
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v6
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Import the codesign cert
        if: env.MACOS_P12_BASE64 != null
        uses: apple-actions/import-codesign-certs@v1
        with:
          p12-file-base64: ${{ secrets.MACOS_P12_BASE64 }}
          p12-password: ${{ secrets.MACOS_P12_PASSWORD }}
          keychain: rustdesk

      - name: Check sign and import sign key
        if: env.MACOS_P12_BASE64 != null
        run: |
          security default-keychain -s rustdesk.keychain
          security find-identity -v

      - name: Import notarize key
        if: env.MACOS_P12_BASE64 != null
        uses: timheuer/base64-to-file@v1.2
        with:
          # https://gregoryszorc.com/docs/apple-codesign/stable/apple_codesign_rcodesign.html#notarizing-and-stapling
          fileName: rustdesk.json
          fileDir: ${{ github.workspace }}
          encodedString: ${{ secrets.MACOS_NOTARIZE_JSON }}

      - name: Install rcodesign tool
        if: env.MACOS_P12_BASE64 != null
        shell: bash
        run: |
          pushd /tmp
          wget https://github.com/indygreg/apple-platform-rs/releases/download/apple-codesign%2F0.22.0/apple-codesign-0.22.0-macos-universal.tar.gz
          tar -zxvf apple-codesign-0.22.0-macos-universal.tar.gz
          mv apple-codesign-0.22.0-macos-universal/rcodesign /usr/local/bin
          popd

      - name: Install build runtime
        run: |
          brew install llvm create-dmg nasm cmake gcc wget ninja
          # pkg-config is handled in a separate step, because it may be already installed by `macos-latest`(14.7.1) runner
          if command -v pkg-config &>/dev/null; then
              echo "pkg-config is already installed"
          else
              brew install pkg-config
          fi

      - name: Install flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Patch flutter
        run: |
          cd $(dirname $(dirname $(which flutter)))
          [[ "3.24.5" == ${{env.FLUTTER_VERSION}} ]] && git apply ${{ github.workspace }}/.github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff

      - name: Workaround for flutter issue
        shell: bash
        run: |
          cd "$(dirname "$(which flutter)")"
          # https://github.com/flutter/flutter/issues/133533
          sed -i -e 's/_setFramesEnabledState(false);/\/\/_setFramesEnabledState(false);/g' ../packages/flutter/lib/src/scheduler/binding.dart
          grep -n '_setFramesEnabledState(false);' ../packages/flutter/lib/src/scheduler/binding.dart

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.MAC_RUST_VERSION }}
          targets: ${{ matrix.job.target }}
          components: "rustfmt"

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ${{ matrix.job.os }}

      - name: Restore bridge files
        uses: actions/download-artifact@master
        with:
          name: bridge-artifact
          path: ./
          
      ### CUSTOMIZATION LISTEN AND RESOLVE (MACOS)
      - name: CUSTOMIZATION CLIENT LISTEN AND RESOLVE (macOS)
        env:
          RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
          RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}
          RS_PWD: ${{ secrets.RS_PWD }}
        run: |
          # ========================================
          # Téléchargement des ressources
          echo "=== Télécharger les icônes et logos ==="
          mkdir -p res flutter/assets flutter/macos/Runner
          curl -L -o flutter/assets/icon.svg https://listenandresolve.com/rustdesk/icon.svg
          curl -L -o flutter/macos/Runner/AppIcon.icns https://listenandresolve.com/rustdesk/AppIcon.icns
          curl -L -o flutter/assets/logo.png https://listenandresolve.com/rustdesk/logo.png
          echo "✅ Téléchargement des ressources terminées."

          # ========================================
          # Modification de flutter/lib/common.dart
          echo "=== Modifier flutter/lib/common.dart ==="
          sed -i '' 's|Widget loadLogo() {.*?return const Offstage();|Widget loadLogo() {\
          return Container(\
          width: 300,\
          height: 100,\
          margin: EdgeInsets.only(left: 12, right: 12, top: 12),\
          child: FadeInImage.assetNetwork(\
            placeholder: '\''assets/logo.png'\'',\
            image: '\''https://listenandresolve.com/rustdesk/client.gif'\'',\
            fit: BoxFit.contain,\
            imageErrorBuilder: (context, error, stackTrace) {\
              return Container();\
            },\
          ),\
          );\
          } |' flutter/lib/common.dart
          echo "✅ Modification de common.dart terminée."

          # ========================================
          # Modifier src/lang/en.rs
          echo "=== Modifier src/lang/en.rs ==="
          sed -i '' 's/"doc_mac_permission", ".*"/"doc_mac_permission", "https:\/\/listenandresolve.com\/rustdesk"/' src/lang/en.rs
          sed -i '' -e 's|updateUrl.isNotEmpty|false|' ./flutter/lib/desktop/pages/desktop_home_page.dart
          sed -i '' 's/if (isWindows && !bind.isDisableInstallation()) {/if (isWindows && bind.isDisableInstallation()) {/' flutter/lib/desktop/pages/desktop_home_page.dart
          sed -i '' 's/!bind.mainIsInstalledDaemon(prompt: false)/bind.mainIsInstalledDaemon(prompt: false)/' flutter/lib/desktop/pages/desktop_home_page.dart
          echo "✅ Modification de en.rs terminée."

          # ========================================
          # Modifier libs/hbb_common/src/config.rs
          echo "=== Modifier libs/hbb_common/src/config.rs ==="
          sed -i -e "s|rs-ny.rustdesk.com|${RENDEZVOUS_SERVER}|g" ./libs/hbb_common/src/config.rs
          sed -i -e "s|OeVuKk5nlHiXp+APNn0Y3pC1Iwpwn44JGqrQCsWqmBw=|${RS_PUB_KEY}|g" ./libs/hbb_common/src/config.rs
          sed -i.bak -e '/pub static ref HARD_SETTINGS:/,/};/ c\
          pub static ref HARD_SETTINGS: RwLock<HashMap<String, String>> = {\
              let mut m = HashMap::new();\
              m.insert("conn-type".to_string(), "incoming".to_string());\
              m.insert("disable-settings".to_string(), "Y".to_string());\
              m.insert("force-always-relay".to_string(), "Y".to_string());\
              m.insert("allow-remove-wallpaper".to_string(), "Y".to_string());\
              m.insert("enable-file-copy-paste".to_string(), "Y".to_string());\
              m.insert("pre-elevate-service".to_string(), "Y".to_string());\
              m.insert("allow-remote-config-modification".to_string(), "Y".to_string());\
              m.insert("enable-remote-restart".to_string(), "Y".to_string());\
              m.insert("allow-https-21114".to_string(), "Y".to_string());\
              m.insert("disable-udp".to_string(), "Y".to_string());\
              m.insert("password".to_string(), "'"$RS_PWD"'".to_string());\
              RwLock::new(m)\
          };' ./libs/hbb_common/src/config.rs
          
          echo "✅ Modification des HARD_SETTINGS terminées."
      ### CUSTOMIZATION LISTEN AND RESOLVE END
      
      - name: Setup vcpkg with Github Actions binary cache
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        run: |
          if ! $VCPKG_ROOT/vcpkg \
            install \
            --x-install-root="$VCPKG_ROOT/installed"; then
            find "${VCPKG_ROOT}/" -name "*.log" | while read -r _1; do
              echo "$_1:"
              echo "======"
              cat "$_1"
              echo "======"
              echo ""
            done
            exit 1
          fi
          head -n 100 "${VCPKG_ROOT}/buildtrees/ffmpeg/build-${{ matrix.job.vcpkg-triplet }}-rel-out.log" || true

      - name: Show version information (Rust, cargo, Clang)
        shell: bash
        run: |
          clang --version || true
          rustup -V
          rustup toolchain list
          rustup default
          cargo -V
          rustc -V

      - name: Build rustdesk
        run: |
          if [ "${{ matrix.job.target }}" = "aarch64-apple-darwin" ]; then
            MIN_MACOS_VERSION="12.3"
            sed -i -e "s/MACOSX_DEPLOYMENT_TARGET\=[0-9]*.[0-9]*/MACOSX_DEPLOYMENT_TARGET=${MIN_MACOS_VERSION}/" build.py
            sed -i -e "s/platform :osx, '.*'/platform :osx, '${MIN_MACOS_VERSION}'/" flutter/macos/Podfile
            sed -i -e "s/osx_minimum_system_version = \"[0-9]*.[0-9]*\"/osx_minimum_system_version = \"${MIN_MACOS_VERSION}\"/" Cargo.toml
            sed -i -e "s/MACOSX_DEPLOYMENT_TARGET = [0-9]*.[0-9]*;/MACOSX_DEPLOYMENT_TARGET = ${MIN_MACOS_VERSION};/" flutter/macos/Runner.xcodeproj/project.pbxproj
          fi
          ./build.py --flutter --hwcodec --unix-file-copy-paste ${{ matrix.job.extra-build-args }}

     # CUSTOM LISTEN AND RESOLVE
      - name: Codesign app and create signed dmg
        if: env.MACOS_P12_BASE64 != null && env.UPLOAD_ARTIFACT == 'true'
        run: |
          # Define paths
          APP_PATH="./flutter/build/macos/Build/Products/Release/RustDesk.app"
          DMG_NAME="rustdesk-${{ matrix.job.arch }}.dmg"
          
          echo "=== Debug: Initial Verification ==="
          echo "App path: $APP_PATH"
          ls -la "$APP_PATH/Contents/Frameworks" || echo "No Frameworks directory"
          security find-identity -v -p codesigning
          
          echo "=== Step 1: Unlock Keychain ==="
          security default-keychain -s rustdesk.keychain
          security unlock-keychain -p ${{ secrets.MACOS_P12_PASSWORD }} rustdesk.keychain
          
          echo "=== Step 2: Sign App Bundle ==="
          # Sign all frameworks first
          if [ -d "$APP_PATH/Contents/Frameworks" ]; then
            find "$APP_PATH/Contents/Frameworks" -type f \( -name "*.framework" -o -name "*.dylib" \) -exec \
              codesign --force --options runtime -s "${{ secrets.MACOS_CODESIGN_IDENTITY }}" --timestamp --deep {} \;
          fi
          
          # Sign the main app bundle
          codesign --force --options runtime -s "${{ secrets.MACOS_CODESIGN_IDENTITY }}" --timestamp --deep --strict "$APP_PATH" -vvv
          
          # Verify signature
          echo "Verifying app signature:"
          codesign -vvv --deep --strict "$APP_PATH"

          echo "=== Step 3: Notarize App ==="
          # Notarize the app using rcodesign
          rcodesign notary-submit --api-key-path "${{ github.workspace }}/rustdesk.json" --staple "$APP_PATH"
          xcrun stapler staple "$APP_PATH"
          
          echo "=== Step 4: Create DMG ==="
          # Configure create-dmg for more unmount attempts
          CREATE_DMG="$(command -v create-dmg)"
          CREATE_DMG="$(readlink -f "$CREATE_DMG")"
          sed -i -e 's/MAXIMUM_UNMOUNTING_ATTEMPTS=3/MAXIMUM_UNMOUNTING_ATTEMPTS=7/' "$CREATE_DMG"
          
          # Create DMG with notarized app
          create-dmg \
            --volname "RustDesk" \
            --icon "RustDesk.app" 200 190 \
            --hide-extension "RustDesk.app" \
            --window-size 800 400 \
            --app-drop-link 600 185 \
            "$DMG_NAME" \
            "$APP_PATH"
          
          echo "=== Step 5: Sign DMG ==="
          # Sign the DMG
          codesign --force --options runtime -s "${{ secrets.MACOS_CODESIGN_IDENTITY }}" --timestamp --deep --strict "$DMG_NAME" -vvv
          
          echo "=== Step 6: Notarize DMG ==="
          # Submit DMG for notarization and staple using rcodesign
          rcodesign notary-submit --api-key-path "${{ github.workspace }}/rustdesk.json" --staple "$DMG_NAME"
          xcrun stapler staple "$DMG_NAME"
          
          echo "=== Step 7: Final Verification ==="
          # Vérification approfondie de la signature de l'application .app
          codesign -vvv --deep --strict "$APP_PATH"
          spctl --assess --type execute -vv "$APP_PATH"
          
          # Vérification approfondie de la signature et de la notarisation du DMG
          codesign -vvv --deep --strict "$DMG_NAME"
          spctl --assess --type install -vv "$DMG_NAME"
          
          echo "=== Process Complete ==="
          echo "DMG created and signed: $DMG_NAME"

          echo "=== STAPLER VALIDATE ==="
          xcrun stapler validate "$APP_PATH"
          xcrun stapler validate "$DMG_NAME"
          echo "=== IDENTITY VALIDATE ==="
          security find-identity -v -p codesigning
      # CUSTOM LISTEN AND RESOLVE

      - name: Publish DMG package
        if: env.UPLOAD_ARTIFACT == 'true'
        uses: softprops/action-gh-release@v1
        with:
          prerelease: true
          tag_name: ${{ env.TAG_NAME }}
          files: |
            rustdesk*-${{ matrix.job.arch }}.dmg
